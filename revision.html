<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVPR - Evaluación</title>

<style>
:root{
  --bg:#f5f7fb;--surface:#fff;--soft:#f8fafc;--text:#0f172a;
  --muted:#64748b;--border:#e2e8f0;
  --primary:#2563eb;--primary2:#1d4ed8;
  --nav:#071735;
  --orange:#f97316;--yellow:#eab308;--green:#16a34a;--red:#dc2626;
  --shadow:0 18px 45px rgba(15,23,42,.08);
  --radius:18px
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui;
  background:linear-gradient(135deg,#eef6ff,#f8fafc 45%,#f5f7fb);
  color:var(--text)
}

.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

.sidebar{
  background:linear-gradient(180deg,#071735,#0b2452);
  color:#e5edff;padding:26px
}

.main{padding:30px;max-width:1200px;margin:auto}

.card{
  background:white;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:var(--shadow)
}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:white;
  cursor:pointer;
  font-weight:bold
}

textarea{width:100%;min-height:120px;margin-top:10px}

.semaforo{font-size:22px;font-weight:bold}
.naranja{color:var(--orange)}
.amarillo{color:var(--yellow)}
.verde{color:var(--green)}

.metric-card{
  background:#f8fafc;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px
}

/* 🔥 NUEVO BLOQUE CLÍNICO */
.clinical-box{
  margin-top:18px;
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  background:#f8fafc;
}
.clinical-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.clinical-badge{
  font-size:12px;
  font-weight:900;
  border-radius:999px;
  padding:6px 10px;
}
.clinical-obligatoria{background:#fee2e2;color:#991b1b;}
.clinical-recomendada{background:#ffedd5;color:#9a3412;}
.clinical-criterio{background:#fef3c7;color:#92400e;}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
  <h2>SVPR</h2>
  <p>Sistema de riesgo</p>
</div>

<div class="main">

<div class="card">
  <h2>Ingreso</h2>
  <input id="dni" placeholder="DNI víctima">
  <textarea id="relato" placeholder="Relato"></textarea>
  <button onclick="crearCaso()">Evaluar</button>
  <div id="estado"></div>
</div>

<div class="card">
  <h2>Resultado</h2>

  <div class="metric-card">
    <small>Riesgo</small>
    <div id="riesgoFinal" class="semaforo">-</div>
  </div>

  <div class="metric-card">
    <small>Score</small>
    <div id="scoreFinal">-</div>
  </div>

  <div>
    <b>Motivos</b>
    <div id="riskReasonsFinal"></div>
  </div>

  <!-- 🔥 BLOQUE NUEVO -->
  <div id="derivacionEpiBox" class="clinical-box" style="display:none;">
    <div class="clinical-header">
      <b>Derivación clínica al EPI</b>
      <span id="clinicalReferralBadge" class="clinical-badge">-</span>
    </div>

    <div>
      <b>Motivos:</b>
      <div id="clinicalReferralReasons">-</div>
    </div>

    <div style="margin-top:10px;">
      <b>Justificación:</b>
      <div id="clinicalReferralJustification">-</div>
    </div>
  </div>

</div>

</div>
</div>

<script>

const API = window.location.origin;

async function crearCaso(){

  const res = await fetch(API + "/crear-caso-desde-relato",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      victim_document:document.getElementById("dni").value,
      narrative:document.getElementById("relato").value
    })
  });

  const data = await res.json();

  mostrarResultado(data);
}

function mostrarResultado(data){

  document.getElementById("scoreFinal").innerText = data.score_total;

  const riesgoDiv = document.getElementById("riesgoFinal");

  if(data.risk_level==="alto"){
    riesgoDiv.innerText="🟠 ALTO";
    riesgoDiv.className="semaforo naranja";
  }else if(data.risk_level==="moderado"){
    riesgoDiv.innerText="🟡 MODERADO";
    riesgoDiv.className="semaforo amarillo";
  }else{
    riesgoDiv.innerText="🟢 BAJO";
    riesgoDiv.className="semaforo verde";
  }

  // motivos
  document.getElementById("riskReasonsFinal").innerHTML =
    (data.risk_reasons || []).map(m=>"• "+m).join("<br>");

  // 🔥 DERIVACIÓN CLÍNICA
  const box = document.getElementById("derivacionEpiBox");
  const badge = document.getElementById("clinicalReferralBadge");
  const reasons = document.getElementById("clinicalReferralReasons");
  const just = document.getElementById("clinicalReferralJustification");

  if(data.clinical_referral_level){

    box.style.display="block";

    badge.className="clinical-badge";

    if(data.clinical_referral_level==="obligatoria"){
      badge.innerText="Obligatoria";
      badge.classList.add("clinical-obligatoria");
    }else if(data.clinical_referral_level==="recomendada"){
      badge.innerText="Recomendada";
      badge.classList.add("clinical-recomendada");
    }else{
      badge.innerText="A criterio";
      badge.classList.add("clinical-criterio");
    }

    reasons.innerHTML =
      (data.clinical_referral_reasons || []).map(m=>"• "+m).join("<br>");

    just.innerText = data.clinical_referral_justification || "-";

  }else{
    box.style.display="none";
  }
}

</script>

</body>
</html>
